name: Publish project site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install notebook tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install nbconvert jupyter pandas numpy matplotlib seaborn scikit-learn joblib markdown

      - name: Build site content
        run: |
          python - <<'PY'
          from pathlib import Path
          import markdown as md

          root = Path('.')
          site = root / 'site'
          site.mkdir(parents=True, exist_ok=True)

          def render_markdown(source_path: Path, output_name: str, title: str) -> None:
              content = source_path.read_text(encoding='utf-8')
              body = md.markdown(content, extensions=['fenced_code', 'tables'])
              html = f'''<!doctype html>
          <html lang="fr">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>{title}</title>
            <style>
              body {{ margin: 0; font-family: Arial, Helvetica, sans-serif; background: #0f172a; color: #e5e7eb; }}
              main {{ max-width: 1000px; margin: 0 auto; padding: 48px 24px 80px; }}
              article {{ background: #111827; border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 20px; padding: 32px; line-height: 1.7; }}
              a {{ color: #38bdf8; }}
              pre {{ overflow-x: auto; padding: 16px; background: #020617; border-radius: 12px; }}
              code {{ font-family: Consolas, Monaco, monospace; }}
              h1, h2, h3 {{ line-height: 1.2; }}
            </style>
          </head>
          <body>
            <main>
              <article>
                {body}
              </article>
            </main>
          </body>
          </html>'''
              (site / output_name).write_text(html, encoding='utf-8')

          render_markdown(root / 'README.md', 'README.html', 'SECOM Predictive Maintenance - README')
          render_markdown(root / 'RAPPORT_PROJET.md', 'RAPPORT_PROJET.html', 'SECOM Predictive Maintenance - Rapport')
          (site / 'README.md').write_text((root / 'README.md').read_text(encoding='utf-8'), encoding='utf-8')
          (site / 'RAPPORT_PROJET.md').write_text((root / 'RAPPORT_PROJET.md').read_text(encoding='utf-8'), encoding='utf-8')
          jupyter nbconvert --to html --output secom_predictive_maintenance.html --output-dir site secom_predictive_maintenance.ipynb
          index_html = '''<!doctype html>
          <html lang="fr">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>SECOM Predictive Maintenance</title>
            <style>
              :root {
                color-scheme: light;
                --bg: #0f172a;
                --panel: #111827;
                --card: #1f2937;
                --accent: #38bdf8;
                --text: #e5e7eb;
                --muted: #94a3b8;
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background: linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 100%);
                color: var(--text);
              }
              main {
                max-width: 960px;
                margin: 0 auto;
                padding: 64px 24px;
              }
              .hero {
                background: rgba(15, 23, 42, 0.82);
                border: 1px solid rgba(148, 163, 184, 0.18);
                border-radius: 24px;
                padding: 40px;
                box-shadow: 0 20px 80px rgba(15, 23, 42, 0.45);
              }
              h1 { margin: 0 0 12px; font-size: clamp(2rem, 4vw, 3.5rem); }
              p { line-height: 1.6; color: var(--muted); }
              .links {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 16px;
                margin-top: 28px;
              }
              a.card {
                display: block;
                padding: 18px 20px;
                border-radius: 18px;
                text-decoration: none;
                color: var(--text);
                background: rgba(31, 41, 55, 0.9);
                border: 1px solid rgba(56, 189, 248, 0.18);
              }
              a.card strong {
                display: block;
                margin-bottom: 6px;
                color: var(--accent);
              }
            </style>
          </head>
          <body>
            <main>
              <section class="hero">
                <h1>SECOM Predictive Maintenance</h1>
                <p>Version publiée du projet de maintenance prédictive sur le dataset SECOM. Les sources du rapport et le notebook sont disponibles ci-dessous.</p>
                <div class="links">
                  <a class="card" href="secom_predictive_maintenance.html">
                    <strong>Notebook rendu</strong>
                    Ouvre la version HTML du notebook.
                  </a>
                  <a class="card" href="RAPPORT_PROJET.html">
                    <strong>Rapport</strong>
                    Consulte le rapport du projet en HTML.
                  </a>
                  <a class="card" href="README.html">
                    <strong>Instructions</strong>
                    Voir les informations d'exécution et le contexte.
                  </a>
                </div>
              </section>
            </main>
          </body>
          </html>'''
          (site / 'index.html').write_text(index_html, encoding='utf-8')

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4